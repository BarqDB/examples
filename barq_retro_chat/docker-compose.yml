# barqDB Messenger — one service, one port, one persistent volume.
#
#   docker compose up --build            # build + run; FIRST boot auto-seeds ~1M messages
#   SEED_COUNT=250000 docker compose up  # seed a smaller archive on first boot
#   SEED_COUNT=0 docker compose up        # start empty (no seeding)
#   BARQ_BOTS=on docker compose up --build   # with simulated live load
#   HOST_PORT=9000 docker compose up     # publish on a different host port
#
# On first boot the entrypoint imports the dataset into the volume, then starts the server;
# every later restart finds the seed marker and skips straight to the server.
# The BarqDB files live in the named volume `messenger-data`, so the archive and the
# "users served" tally survive `docker compose down` (use `-v` to wipe them).

services:
  messenger:
    build:
      context: .
    image: barqdb-messenger:latest
    container_name: barqdb-messenger
    platform: linux/amd64            # BarqDB's JVM engine is linux-x86_64
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      BARQ_DATA_DIR: /data
      SEED_COUNT: "${SEED_COUNT:-1000000}"  # rows imported on first boot; 0 = start empty
      BARQ_BOTS: "${BARQ_BOTS:-off}"        # "on" generates real load with simulated users
      JAVA_OPTS: "-Xmx1g"
    volumes:
      - messenger-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      # First boot seeds ~1M rows before the server starts; give it room.
      start_period: 240s

volumes:
  messenger-data:
